---
layout: default
---

<article class="post-full">
  {% if page.image %}
  <div class="post-hero-img">
    <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
  </div>
  {% endif %}
  <header class="post-header">
    <p class="post-meta">{{ page.date | date: "%d.%m.%y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="post-subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  <a href="{{ '/news/' | relative_url }}" class="back-link">&larr; Back to news</a>
</article>
