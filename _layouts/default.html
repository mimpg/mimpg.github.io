<!doctype html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

{% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
    {% include head-custom.html %}
  </head>
  <body>

    <!-- Top navigation -->
    <header class="site-header">
      <div class="header-inner">
        <div class="header-spacer"></div>
        <button class="nav-toggle" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        {% include navigation.html %}
      </div>
    </header>

    <canvas id="header-net" aria-hidden="true"></canvas>

    <!-- Site title block -->
    <div class="site-title-block">
      <h1 class="site-title"><a href="{{ '/' | relative_url }}">MImPG</a> <span class="site-title-badge">a transdisciplinary research project</span></h1>
      <p class="site-subtitle">Metropolitan Internet meets Post Growth</p>
    </div>

    <!-- Main content -->
    <main class="site-content">
      <div class="container">
        {{ content }}
      </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <canvas id="footer-net" aria-hidden="true"></canvas>
      <div class="container">
        <div class="footer-inner">

            <br/>
          <div class="footer-logos">
            <a href="https://www.uclouvain.be/"><img src="{{ '/img/logo_UCLouvain.png' | relative_url }}" alt="UCLouvain" height="36"></a>
            <a href="https://www.ulb.be/"><img src="{{ '/img/logo_ULB.png' | relative_url }}" alt="ULB" height="36"></a>
          </div>
          <p class="footer-text">Funded by the Brussels-Capital Region &ndash; Innoviris</p>
          <div class="footer-logos">
            <a href="https://innoviris.brussels/"><img src="{{ '/img/innoviris.jpg' | relative_url }}" alt="Innoviris" height="48" width="128" style="object-fit: cover;" onerror="this.style.display='none'"></a>
            </div>
          <p class="footer-credit"><small>Hosted on <a href="https://pages.github.com">GitHub Pages</a></small></p>
        </div>
      </div>
    </footer>

    <script>
      document.querySelector('.nav-toggle').addEventListener('click', function() {
        document.querySelector('.site-nav').classList.toggle('open');
        this.classList.toggle('active');
      });

      (function () {
        /**
         * NetCanvas — animated network graph on a <canvas> element.
         *
         * @param {string} id   - DOM id of the <canvas> element to draw on.
         * @param {object} opts
         *   @param {number} opts.n     - Number of floating nodes.
         *   @param {number} opts.dist  - Max distance (px) at which two nodes are connected by a line.
         *   @param {number} opts.la    - Max opacity of connecting lines (0–1); fades with distance.
         *   @param {string} opts.lc    - CSS colour of connecting lines (e.g. '#312782').
         *   @param {number} opts.na    - Opacity of node circles (0–1).
         *   @param {string} opts.nc    - CSS fill colour of node circles.
         */
        function NetCanvas(id, opts) {
          var el = document.getElementById(id);
          if (!el) return;
          var ctx = el.getContext('2d');
          var W, H, nodes;

          function setup() {
            var rect = el.parentElement.getBoundingClientRect();
            W = el.offsetWidth  || rect.width;
            H = el.offsetHeight || rect.height;
            el.width  = W;
            el.height = H;
            nodes = [];
            for (var i = 0; i < opts.n; i++) {
              nodes.push({
                x: Math.random() * W,
                y: Math.random() * H,
                vx: (Math.random() - .5) * .45,
                vy: (Math.random() - .5) * .45,
                r: Math.random() * 2.2 + 1.2,
                phase: Math.random() * Math.PI * 2
              });
            }
          }

          setup();
          window.addEventListener('resize', setup);

          function frame() {
            ctx.clearRect(0, 0, W, H);
            for (var i = 0; i < nodes.length; i++) {
              var n = nodes[i];
              n.x += n.vx; n.y += n.vy; n.phase += 0.011;
              if (n.x < 0 || n.x > W) n.vx *= -1;
              if (n.y < 0 || n.y > H) n.vy *= -1;
            }
            ctx.lineWidth = .75;
            for (var i = 0; i < nodes.length; i++) {
              for (var j = i + 1; j < nodes.length; j++) {
                var dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
                var d = Math.sqrt(dx*dx + dy*dy);
                if (d < opts.dist) {
                  ctx.globalAlpha = (1 - d / opts.dist) * opts.la;
                  ctx.strokeStyle = opts.lc;
                  ctx.beginPath();
                  ctx.moveTo(nodes[i].x, nodes[i].y);
                  ctx.lineTo(nodes[j].x, nodes[j].y);
                  ctx.stroke();
                }
              }
            }
            for (var i = 0; i < nodes.length; i++) {
              var n = nodes[i];
              var pr = n.r * (1 + Math.sin(n.phase) * .3);
              ctx.globalAlpha = opts.na;
              ctx.fillStyle = opts.nc;
              ctx.beginPath();
              ctx.arc(n.x, n.y, pr, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(frame);
          }
          requestAnimationFrame(frame);
        }

        NetCanvas('header-net', { n: 80, dist: 115, la: .55, lc: '#312782', na: .55, nc: '#312782' });
        NetCanvas('footer-net', { n: 38, dist: 130, la: .38, lc: '#F2E8D6', na: .45, nc: '#F2E8D6' });
      })();
    </script>
  </body>
</html>
